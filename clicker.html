<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Money Tycoon - Pro Balance</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/clicker.css">
</head>
<body> 
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>💵 Money Tycoon</h1>
                
                <div class="stats-bar">
                    <h2 style="color: #00ed9a;">Balance: <span id="balance">0</span> 💵</h2>
                </div>

                <div class="clicker-container">
                    <div id="coin" class="main-coin" onclick="mine()">💵</div>
                    
                    <div class="button-group" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                        <button class="action-button" onclick="window.location.href='games.html'" style="background: #007bff;">← Back</button>
                        <button class="action-button" onclick="toggleCasino()" style="background: #ffcc00; color: #000;">🎰 Casino</button>
                    </div>
                </div>

                <div class="inventory-section">
                    <h3>📦 Your Assets</h3>
                    <div id="items-list" class="items-grid"></div>
                </div>

                <div id="casino-overlay" class="casino-overlay" style="display: none;">
                    <div class="casino-content">
                        <button class="close-btn" onclick="toggleCasino()">×</button>
                        <h2 style="color: #ffcc00;">Global Market</h2>
                        <div id="slot-machine" class="slot-display">? | ? | ?</div>
                        <div class="casino-buttons" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <button class="action-button" onclick="spin('common')">📦 Common (150)</button>
                            <button class="action-button" onclick="spin('tech')">💻 Tech (2.5k)</button>
                            <button class="action-button" onclick="spin('transport')">🚗 Vehicles (20k)</button>
                            <button class="action-button" onclick="spin('estate')">🏰 Estate (150k)</button>
                            <button class="action-button" onclick="spin('galactic')" style="grid-column: span 2; background: #9b59b6;">🚀 Galactic (1.2M)</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let coins = 0;
        let inventory = [];

        // В каждом кейсе по 10 предметов. Шанс на последние (9 и 10) — самый низкий.
        const shopData = {
            common: { cost: 150, items: [
                {n: "Used Napkin", e: "🧻", p: 10}, {n: "Rusty Key", e: "🔑", p: 60}, {n: "Old Cap", e: "🧢", p: 150}, 
                {n: "Basic Tee", e: "👕", p: 300}, {n: "Fidget Spinner", e: "🌀", p: 500}, {n: "Silver Coin", e: "🪙", p: 1000},
                {n: "Rare Comic", e: "📚", p: 2500}, {n: "Sneakers", e: "👟", p: 5000}, {n: "Gold Ring", e: "💍", p: 12000}, 
                {n: "Diamond Stud", e: "💎", p: 30000}
            ]},
            tech: { cost: 2500, items: [
                {n: "CD-Rom", e: "💿", p: 150}, {n: "Mouse", e: "🖱️", p: 700}, {n: "Keyboard", e: "⌨️", p: 1500},
                {n: "Monitor", e: "🖥️", p: 4000}, {n: "Smartphone", e: "📱", p: 9000}, {n: "Graphics Card", e: "📟", p: 25000},
                {n: "Gaming PC", e: "💻", p: 60000}, {n: "Server Rack", e: "🗄️", p: 150000}, {n: "Microchip", e: "🏮", p: 350000},
                {n: "AI Core", e: "🤖", p: 800000}
            ]},
            transport: { cost: 20000, items: [
                {n: "Skateboard", e: "🛹", p: 3000}, {n: "E-Scooter", e: "🛴", p: 10000}, {n: "Bicycle", e: "🚲", p: 25000},
                {n: "Motorbike", e: "🏍️", p: 70000}, {n: "Old Sedan", e: "🚗", p: 150000}, {n: "Pickup Truck", e: "🛻", p: 400000},
                {n: "Luxury SUV", e: "🚙", p: 900000}, {n: "Sports Car", e: "🏎️", p: 2000000}, {n: "Helicopter", e: "🚁", p: 6000000},
                {n: "Super Yacht", e: "🛥️", p: 15000000}
            ]},
            estate: { cost: 150000, items: [
                {n: "Tent", e: "⛺", p: 15000}, {n: "Wooden Cabin", e: "🛖", p: 70000}, {n: "Trailer", e: "🚛", p: 200000},
                {n: "Small House", e: "🏡", p: 600000}, {n: "Penthouse", e: "🏢", p: 1500000}, {n: "Luxury Mansion", e: "🏰", p: 4500000},
                {n: "Skyscraper", e: "🏙️", p: 12000000}, {n: "Private Port", e: "⚓", p: 35000000}, {n: "Paradise Island", e: "🏝️", p: 100000000},
                {n: "Ancient Castle", e: "🏰", p: 300000000}
            ]},
            galactic: { cost: 1200000, items: [
                {n: "Space Suit", e: "👨‍🚀", p: 120000}, {n: "Satellite", e: "🛰️", p: 600000}, {n: "Space Probe", e: "🚀", p: 2000000},
                {n: "Mars Rover", e: "🚜", p: 10000000}, {n: "Space Station", e: "🛸", p: 50000000}, {n: "Moon Mine", e: "🌑", p: 200000000},
                {n: "Mars Dome", e: "🏗️", p: 700000000}, {n: "Starship", e: "🚢", p: 2000000000}, {n: "Solar System", e: "☀️", p: 15000000000},
                {n: "The Universe", e: "🌌", p: 99999999999}
            ]}
        };

        function save() {
            localStorage.setItem('tycoon_save_pro', coins);
            localStorage.setItem('tycoon_save_inv_pro', JSON.stringify(inventory));
        }

        function load() {
            const c = localStorage.getItem('tycoon_save_pro');
            const i = localStorage.getItem('tycoon_save_inv_pro');
            if (c) coins = parseInt(c);
            if (i) inventory = JSON.parse(i);
            render();
        }

        function mine() {
            coins++;
            render();
            save();
        }

        function toggleCasino() {
            const el = document.getElementById('casino-overlay');
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'flex' : 'none';
        }

        function spin(type) {
            const box = shopData[type];
            const msg = document.getElementById('casino-msg');
            const slot = document.getElementById('slot-machine');

            if (coins < box.cost) {
                msg.innerText = "Insufficient funds! ❌";
                msg.style.color = "#ff4757";
                return;
            }

            coins -= box.cost;
            render();
            msg.innerText = "Processing...";
            msg.style.color = "#ffcc00";
            slot.innerText = "🌀 | 🌀 | 🌀";

            setTimeout(() => {
                const rand = Math.random() * 100;
                
                // 1. ШАНС ПРОИГРЫША (30%)
                if (rand < 30) {
                    slot.innerText = "📉 | 📉 | 📉";
                    msg.innerText = "Market Crash! Investment lost.";
                    msg.style.color = "#ff4757";
                } 
                // 2. ШАНС ВЫИГРЫША (70%)
                else {
                    const itemRand = Math.random() * 100;
                    let idx;
                    
                    // Распределение редкости внутри выигрыша:
                    if (itemRand > 98) idx = 9;      // 2% - Ультра легендарка
                    else if (itemRand > 93) idx = 8; // 5% - Легендарка
                    else if (itemRand > 83) idx = 7; // 10% - Эпик
                    else if (itemRand > 68) idx = 6; // 15% - Редкое
                    else if (itemRand > 48) idx = 5; // 20% - Необычное
                    else if (itemRand > 28) idx = 4; // 20% - Обычное
                    else idx = Math.floor(Math.random() * 4); // 28% на 4 самых дешевых

                    const item = box.items[idx];
                    inventory.push(item);
                    slot.innerText = `${item.e} | ${item.e} | ${item.e}`;
                    msg.innerText = `PROFIT: ${item.n}!`;
                    msg.style.color = "#00ed9a";
                }
                render();
                save();
            }, 700);
        }

        function sell(index) {
            coins += inventory[index].p;
            inventory.splice(index, 1);
            render();
            save();
        }

        function render() {
            document.getElementById('balance').innerText = coins.toLocaleString();
            const list = document.getElementById('items-list');
            list.innerHTML = "";
            if (inventory.length > 0) {
                list.innerHTML = inventory.map((item, i) => `
                    <div class="item-card">
                        <span class="item-emoji">${item.e}</span>
                        <strong>${item.n}</strong><br>
                        <small style="color: #00ed9a;">${item.p.toLocaleString()} 💵</small><br>
                        <button class="btn-sell" onclick="sell(${i})">Sell</button>
                    </div>
                `).join('');
            }
        }

        window.onload = load;
    </script>
</body>
</html>
