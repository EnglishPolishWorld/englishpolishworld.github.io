<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hidden Page</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/clicker.css">
    <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
</head>
<body> 
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>💵 Money Tycoon</h1>
                <p>Click the cash to build your empire!</p>

                <div class="clicker-container">
                    <div class="stats-bar">
                        <h2 style="color: #00ed9a;">Balance: <span id="balance">0</span> 💵</h2>
                    </div>

                    <div id="coin" class="main-coin" onclick="mineCoin()">💵</div>

                    <div class="button-group" style="display: flex; gap: 15px; justify-content: center; margin: 20px 0;">
                        <a href="games.html" class="action-button btn-reset" style="text-decoration: none;">← Back</a>
                        <button class="action-button" onclick="toggleCasino()" style="background: #ffcc00; color: #000;">🎰 Open Casino</button>
                    </div>

                    <div class="inventory-section">
                        <h3>📦 Your Assets</h3>
                        <div id="items-list" class="items-grid">
                            <p style="opacity: 0.5;"></p>
                        </div>
                    </div>
                </div>

                <div id="casino-overlay" class="casino-overlay" style="display: none;">
                    <div class="casino-content">
                        <button class="close-btn" onclick="toggleCasino()">×</button>
                        <h2 style="color: #ffcc00;">🎰 Casino</h2>
                        <p>Cost per spin: <span style="color: #ffcc00;">50 💵</span></p>
                        
                        <div id="slot-machine" class="slot-display">? | ? | ?</div>
                        
                        <button class="action-button" onclick="spinSlots()" style="background: #ffcc00; color: #000; font-weight: bold; width: 100%;">SPIN!</button>
                        <p id="casino-msg" style="margin-top: 20px; min-height: 24px; font-weight: bold;"></p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let coins = 0;
let inventory = [];

// Расширенная база призов
const prizes = [
    { name: "Rusty Coin", emoji: "🪙", sellPrice: 5 },
    { name: "Leather Wallet", emoji: "👛", sellPrice: 80 },
    { name: "Silver Ring", emoji: "💍", sellPrice: 250 },
    { name: "Rolex Watch", emoji: "⌚", sellPrice: 800 },
    { name: "Gold Bar", emoji: "🧱", sellPrice: 2500 },
    { name: "Sports Car", emoji: "🏎️", sellPrice: 12000 },
    { name: "Luxury Yacht", emoji: "🛥️", sellPrice: 45000 },
    { name: "Private Jet", emoji: "🛩️", sellPrice: 100000 },
    { name: "Oil Rig", emoji: "⛽", sellPrice: 350000 },
    { name: "Private Island", emoji: "🏝️", sellPrice: 1000000 }
];

// --- СОХРАНЕНИЕ ---
function saveGame() {
    localStorage.setItem('moneyTycoon_coins', coins);
    localStorage.setItem('moneyTycoon_inventory', JSON.stringify(inventory));
}

function loadGame() {
    const savedCoins = localStorage.getItem('moneyTycoon_coins');
    const savedInventory = localStorage.getItem('moneyTycoon_inventory');
    if (savedCoins !== null) coins = parseInt(savedCoins);
    if (savedInventory !== null) inventory = JSON.parse(savedInventory);
    updateUI();
}

// --- ЛОГИКА ---
function mineCoin() {
    coins++;
    updateUI();
    saveGame();
}

function toggleCasino() {
    const casino = document.getElementById('casino-overlay');
    casino.style.display = (casino.style.display === 'none' || casino.style.display === '') ? 'flex' : 'none';
}

function spinSlots() {
    if (coins < 50) {
        const msg = document.getElementById('casino-msg');
        msg.innerText = "Need more cash! (50 💵)";
        msg.style.color = "#e74c3c";
        return;
    }

    coins -= 50;
    updateUI();
    
    const msg = document.getElementById('casino-msg');
    const slotDisplay = document.getElementById('slot-machine');
    
    msg.innerText = "Spinning...";
    msg.style.color = "#ffcc00";
    slotDisplay.innerText = "🌀 | 🌀 | 🌀";

    setTimeout(() => {
        const rand = Math.random() * 100;
        let wonItem = null;

        // Новая система шансов (всего 100%)
        if (rand < 40) {
            // 40% шанс проигрыша
            slotDisplay.innerText = "❌ | ❌ | ❌";
            msg.innerText = "JACK SHIT! You lost 50 💵";
            msg.style.color = "#e74c3c";
        } else {
            // 60% шанс что-то выбить
            if (rand > 99.9) wonItem = prizes[9];      // Остров (0.1%)
            else if (rand > 99.5) wonItem = prizes[8]; // Вышка (0.4%)
            else if (rand > 98) wonItem = prizes[7];   // Джет (1.5%)
            else if (rand > 95) wonItem = prizes[6];   // Яхта (3%)
            else if (rand > 90) wonItem = prizes[5];   // Машина (5%)
            else if (rand > 80) wonItem = prizes[4];   // Золото (10%)
            else if (rand > 70) wonItem = prizes[3];   // Ролекс (10%)
            else if (rand > 60) wonItem = prizes[2];   // Кольцо (10%)
            else if (rand > 50) wonItem = prizes[1];   // Кошелек (10%)
            else wonItem = prizes[0];                  // Монета (10%)

            inventory.push(wonItem);
            slotDisplay.innerText = `${wonItem.emoji} | ${wonItem.emoji} | ${wonItem.emoji}`;
            msg.innerText = `JACKPOT! Won ${wonItem.name}!`;
            msg.style.color = "#00ed9a";
        }
        
        updateUI();
        saveGame();
    }, 1000);
}

function sellItem(index) {
    const item = inventory[index];
    coins += item.sellPrice;
    inventory.splice(index, 1);
    updateUI();
    saveGame();
}

function updateUI() {
    document.getElementById('balance').innerText = coins.toLocaleString(); // Добавил разделение тысяч для красоты
    const list = document.getElementById('items-list');
    
    if (inventory.length === 0) {
        list.innerHTML = `<p style="opacity: 0.5;">No assets owned yet...</p>`;
    } else {
        list.innerHTML = inventory.map((item, index) => `
            <div class="item-card">
                <span class="item-emoji">${item.emoji}</span>
                <strong>${item.name}</strong><br>
                <small style="color: #00ed9a;">Sell: ${item.sellPrice.toLocaleString()} 💵</small><br>
                <button class="btn-sell" onclick="sellItem(${index})">Sell</button>
            </div>
        `).join('');
    }
}

window.onload = loadGame;
    </script>
</body>
</html>
